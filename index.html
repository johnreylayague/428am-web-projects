<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Dexie CDN -->
    <script src="plugins/dexie.min.js"></script>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div class="container">
      <h1>📝 My To-Do List</h1>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Initializing...</span>
      </div>

      <div class="input-container">
        <input
          type="text"
          id="todoInput"
          placeholder="What needs to be done?"
        />
        <button id="addBtn" type="button">Add</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <ul id="todoList"></ul>

      <div class="stats">
        <span id="totalTasks">0 tasks</span>
        <span id="completedTasks">0 completed</span>
      </div>

      <button class="sync-btn" id="syncBtn" type="button">
        🔄 Sync with Server
      </button>

      <!-- Notification permission button -->
      <div style="margin-top: 16px">
        <button type="button" class="sync-btn" id="notifyBtn">
          🔔 Enable Notifications
        </button>
      </div>

      <!-- UI redirect button to example.html -->
      <div style="margin-top: 25px">
        <button type="button" class="sync-btn" id="exampleRedirectBtn">
          ➡️ Go to Example (example.html)
        </button>
      </div>

      <!-- Install/Uninstall App UI -->
      <div style="margin-top: 25px">
        <button
          type="button"
          class="sync-btn"
          id="installBtn"
          style="display: none"
        >
          📲 Install this app
        </button>
        <button
          type="button"
          class="sync-btn"
          id="uninstallBtn"
          style="display: none"
        >
          🗑️ Uninstall this app
        </button>
      </div>
    </div>

    <script>
      // ---- Dexie Setup ----
      const db = new Dexie("todoAppDB");
      db.version(1).stores({
        todos: "id, text, completed",
        unsynced: "++_id,type,todo,id",
      });

      const API_URL = "http://localhost:3000/api/todos";
      let isOnline = navigator.onLine;
      let todos = [];
      let currentFilter = "all";

      // DOM Elements
      const todoInput = document.getElementById("todoInput");
      const addBtn = document.getElementById("addBtn");
      const todoList = document.getElementById("todoList");
      const filterBtns = document.querySelectorAll(".filter-btn");
      const statusText = document.getElementById("statusText");
      const statusDot = document.getElementById("statusDot");
      const syncBtn = document.getElementById("syncBtn");
      const notifyBtn = document.getElementById("notifyBtn");
      const exampleRedirectBtn = document.getElementById("exampleRedirectBtn");
      const installBtn = document.getElementById("installBtn");
      const uninstallBtn = document.getElementById("uninstallBtn");

      // Add UI redirect to example.html
      exampleRedirectBtn.addEventListener("click", function () {
        window.location.href = "example.html";
      });

      // Service Worker registration
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("service-worker.js")
          .then((reg) => console.log("Service Worker registered!", reg))
          .catch((err) =>
            console.log("Service Worker registration failed:", err)
          );
      }

      // Dexie/IndexedDB Local Storage
      async function getStoredTodos() {
        try {
          const all = await db.todos.toArray();
          return Array.isArray(all) ? all : [];
        } catch (e) {
          return [];
        }
      }
      async function saveTodosLocally() {
        try {
          await db.todos.clear();
          if (todos.length > 0) await db.todos.bulkAdd(todos);
        } catch (e) {
          console.error("Dexie: Error saving todos", e);
        }
      }
      async function getUnsynced() {
        try {
          const unsyncedArr = await db.unsynced.toArray();
          return unsyncedArr || [];
        } catch (e) {
          return [];
        }
      }
      async function saveUnsynced(arr) {
        try {
          await db.unsynced.clear();
          if (arr.length > 0) await db.unsynced.bulkAdd(arr);
        } catch (e) {
          console.error("Dexie: Error saving unsynced", e);
        }
      }
      // Get Cached Todos From Service Worker
      async function getCachedTodosFromSW() {
        if ("caches" in window) {
          try {
            const response = await caches.match(API_URL);
            if (response) {
              const data = await response.json();
              return Array.isArray(data) ? data : [];
            }
          } catch (err) {
            console.error("Error retrieving cached todos:", err);
          }
        }
        return [];
      }

      // Status and Online/Offline logic
      function updateStatus(text, online = true) {
        statusText.textContent = text;
        if (online) {
          statusDot.classList.remove("offline");
        } else {
          statusDot.classList.add("offline");
        }
      }
      async function checkOnlineStatus() {
        isOnline = navigator.onLine;
        if (isOnline) {
          updateStatus("Online - Syncing with server", true);
          await loadFromServer();
        } else {
          updateStatus("Offline - Working locally", false);
          await loadFromLocalOrCache();
        }
      }

      // Server Sync
      async function loadFromServer() {
        try {
          await pushUnsyncedChanges();
          const response = await fetch(API_URL);
          if (response.ok) {
            let serverTodos = await response.json();
            todos = serverTodos;
            await saveTodosLocally();
            renderTodos();
            updateStatus("Online - Connected", true);
          } else {
            await loadFromLocalOrCache();
            updateStatus("Offline - Using local or cached data", false);
          }
        } catch (error) {
          console.error("Failed to load from server:", error);
          await loadFromLocalOrCache();
          updateStatus("Offline - Using local or cached data", false);
        }
      }
      async function loadFromLocalOrCache() {
        let local = await getStoredTodos();
        if (!local || local.length === 0) {
          const cached = await getCachedTodosFromSW();
          todos = cached;
          await saveTodosLocally();
          renderTodos();
          if (cached.length > 0) {
            updateStatus("Offline - Using cached data", false);
          } else {
            updateStatus("Offline - No tasks cached", false);
          }
        } else {
          todos = local;
          renderTodos();
        }
      }
      async function saveToServer(todo, method = "POST", id = null) {
        if (!isOnline) {
          await saveTodosLocally();
          return;
        }
        try {
          const url = id ? `${API_URL}/${id}` : API_URL;
          let options = {
            method: method,
            headers: { "Content-Type": "application/json" },
          };
          if (todo !== null) options.body = JSON.stringify(todo);
          const response = await fetch(url, options);
          if (response.ok) {
            if (method === "POST") {
              let updatedTodo = await response.json();
              todos = todos.map((t) =>
                t.id === updatedTodo.id ? updatedTodo : t
              );
              await saveTodosLocally();
            }
            if (["POST", "PUT", "DELETE"].includes(method)) {
              let unsyncedArr = await getUnsynced();
              if (method === "DELETE" && id) {
                unsyncedArr = unsyncedArr.filter(
                  (action) => !(action.type === "delete" && action.id === id)
                );
              } else if (
                (method === "PUT" || method === "POST") &&
                todo &&
                todo.id
              ) {
                unsyncedArr = unsyncedArr.filter(
                  (action) =>
                    !(
                      (action.type === "add" || action.type === "update") &&
                      action.todo &&
                      action.todo.id === todo.id
                    )
                );
              }
              await saveUnsynced(unsyncedArr);
            }
          }
        } catch (error) {
          console.error("Failed to save to server:", error);
          await saveTodosLocally();
        }
      }
      async function pushUnsyncedChanges() {
        let unsyncedArr = await getUnsynced();
        for (const action of unsyncedArr) {
          if (action.type === "add") {
            await saveToServer(action.todo, "POST");
          } else if (action.type === "update") {
            await saveToServer(action.todo, "PUT", action.todo.id);
          } else if (action.type === "delete") {
            await saveToServer(null, "DELETE", action.id);
          }
        }
        await saveUnsynced([]);
      }

      // Todo Actions
      async function addTodo() {
        const text = todoInput.value.trim();
        if (text === "") return;
        const todo = {
          id: Date.now(),
          text: text,
          completed: false,
        };
        todos.push(todo);
        await saveTodosLocally();

        if (isOnline) {
          await saveToServer(todo, "POST");
        } else {
          let u = await getUnsynced();
          u.push({ type: "add", todo: todo });
          await saveUnsynced(u);
        }
        todoInput.value = "";
        renderTodos();
      }
      async function deleteTodo(id) {
        const index = todos.findIndex((todo) => todo.id === id);
        if (index === -1) return;
        todos.splice(index, 1);

        if (isOnline) {
          await saveToServer(null, "DELETE", id);
        } else {
          let u = await getUnsynced();
          u.push({ type: "delete", id: id });
          await saveUnsynced(u);
        }
        await saveTodosLocally();
        renderTodos();
      }
      async function toggleTodo(id) {
        const todo = todos.find((t) => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          await saveTodosLocally();
          if (isOnline) {
            await saveToServer(todo, "PUT", id);
          } else {
            let u = await getUnsynced();
            u.push({ type: "update", todo: { ...todo } });
            await saveUnsynced(u);
          }
          renderTodos();
        }
      }

      // Syncing
      async function syncWithServer() {
        if (!isOnline) {
          alert("Cannot sync while offline");
          return;
        }
        updateStatus("Syncing pending local changes...", true);
        await pushUnsyncedChanges();
        await loadFromServer();
        alert("Sync complete!");
      }

      // Rendering
      function renderTodos() {
        const filteredTodos = todos.filter((todo) => {
          if (currentFilter === "active") return !todo.completed;
          if (currentFilter === "completed") return todo.completed;
          return true;
        });
        todoList.innerHTML = "";
        if (filteredTodos.length === 0) {
          todoList.innerHTML =
            '<div class="empty-state">No tasks to show</div>';
        } else {
          filteredTodos.forEach((todo) => {
            const li = document.createElement("li");
            li.className = `todo-item ${todo.completed ? "completed" : ""}`;
            li.innerHTML = `
                        <input type="checkbox" ${
                          todo.completed ? "checked" : ""
                        } onchange="toggleTodo(${todo.id})" />
                        <span class="todo-text">${todo.text}</span>
                        <button class="delete-btn" onclick="deleteTodo(${
                          todo.id
                        })">Delete</button>
                    `;
            todoList.appendChild(li);
          });
        }
        updateStats();
      }
      function updateStats() {
        const total = todos.length;
        const completed = todos.filter((t) => t.completed).length;
        document.getElementById("totalTasks").textContent = `${total} ${
          total === 1 ? "task" : "tasks"
        }`;
        document.getElementById(
          "completedTasks"
        ).textContent = `${completed} completed`;
      }

      // Event Listeners / Startup Logic
      window.toggleTodo = toggleTodo;
      window.deleteTodo = deleteTodo;
      addBtn.addEventListener("click", addTodo);
      todoInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addTodo();
      });
      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          filterBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          renderTodos();
        });
      });
      syncBtn.addEventListener("click", syncWithServer);
      window.addEventListener("online", async () => {
        isOnline = true;
        updateStatus("Back online - Syncing...", true);
        await loadFromServer();
      });
      window.addEventListener("offline", async () => {
        isOnline = false;
        updateStatus("Offline - Working locally", false);
        await loadFromLocalOrCache();
      });

      // --- Notification Permission ---
      notifyBtn.addEventListener("click", () => {
        if ("Notification" in window) {
          Notification.requestPermission().then((permission) => {
            if (permission === "granted") {
              showNativeNotification(
                "Notifications enabled!",
                "You will now receive notifications from this To-Do App."
              );
            } else if (permission === "denied") {
              alert("You have denied notifications for this site.");
            }
          });
        } else {
          alert("This browser does not support notifications.");
        }
      });

      // --- Native notification function using showNotification in Service Worker for stacking ---
      function showNativeNotification(
        title,
        body,
        icon = "icons/icon-192.png"
      ) {
        // If service worker ready, show OS-level notification (which stacks), otherwise fallback to Notification API
        if (
          "serviceWorker" in navigator &&
          navigator.serviceWorker.controller
        ) {
          navigator.serviceWorker.ready.then(function (registration) {
            // Use a unique tag per notification (by default omitted), so every notification shows and stacks
            registration.showNotification(title, {
              body: body,
              icon: icon,
              badge: icon,
            });
          });
        } else if (
          "Notification" in window &&
          Notification.permission === "granted"
        ) {
          try {
            new Notification(title, {
              body: body,
              icon: icon,
              badge: icon,
              tag: "todolist-" + Date.now() + "-" + Math.random(),
            });
          } catch (err) {
            // ignore
          }
        }
      }

      // --- PWA Install/Uninstall Logic ---
      let deferredPrompt = null;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = "inline-block";
      });

      installBtn.addEventListener("click", async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === "accepted") {
            installBtn.style.display = "none";
            showUninstallIfSupported();
          }
          deferredPrompt = null;
        }
      });

      function showUninstallIfSupported() {
        if (
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true
        ) {
          uninstallBtn.style.display = "inline-block";
        }
      }

      uninstallBtn.addEventListener("click", () => {
        let instructions = "To uninstall this app, ";
        if (
          navigator.userAgent.includes("Android") ||
          /Mobile/i.test(navigator.userAgent)
        ) {
          instructions +=
            "remove it from your home screen by holding the app icon and selecting uninstall/remove.";
        } else if (
          navigator.userAgent.includes("iPhone") ||
          navigator.userAgent.includes("iPad")
        ) {
          instructions +=
            "long press this app's icon on your home screen, then tap 'Remove App'.";
        } else {
          instructions +=
            "use your browser's menu to remove or uninstall the app.";
        }
        alert(instructions);
      });

      document.addEventListener("DOMContentLoaded", () => {
        checkOnlineStatus();
        // install/uninstall app startup display
        if (
          window.matchMedia("(display-mode: standalone)").matches ||
          window.navigator.standalone === true
        ) {
          installBtn.style.display = "none";
          showUninstallIfSupported();
        } else {
          uninstallBtn.style.display = "none";
        }
      });
    </script>
  </body>
</html>
