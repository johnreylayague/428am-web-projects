<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .dev-controls {
        margin: 16px 0 0 0;
        padding: 8px 0 0 0;
        border-top: 1px solid #eee;
        text-align: right;
      }
      .dev-btn {
        margin-left: 6px;
        background: #ddd;
        color: #333;
        border-radius: 5px;
        padding: 3px 10px;
        border: none;
        cursor: pointer;
        font-size: 12px;
      }
      .dev-btn.active {
        background: #059669;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 My To-Do List</h1>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Initializing...</span>
      </div>

      <div class="input-container">
        <input
          type="text"
          id="todoInput"
          placeholder="What needs to be done?"
        />
        <button id="addBtn" type="button">Add</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <ul id="todoList"></ul>

      <div class="stats">
        <span id="totalTasks">0 tasks</span>
        <span id="completedTasks">0 completed</span>
      </div>

      <button class="sync-btn" id="syncBtn" type="button">
        🔄 Sync with Server
      </button>

      <div class="dev-controls" style="display:none">
        <!-- Offline/Online controls removed -->
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:3000/api/todos";
      let isOnline = navigator.onLine;
      let todos = [];
      let unsynced = [];
      let currentFilter = "all";

      // DOM Elements
      const todoInput = document.getElementById("todoInput");
      const addBtn = document.getElementById("addBtn");
      const todoList = document.getElementById("todoList");
      const filterBtns = document.querySelectorAll(".filter-btn");
      const statusText = document.getElementById("statusText");
      const statusDot = document.getElementById("statusDot");
      const syncBtn = document.getElementById("syncBtn");
      

      // Service Worker Registration
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("service-worker.js")
          .then((reg) => console.log("Service Worker registered!", reg))
          .catch((err) =>
            console.log("Service Worker registration failed:", err)
          );
      }

      // -------------- LocalStorage Helpers --------------

      function getStoredTodos() {
        return JSON.parse(localStorage.getItem("todos")) || [];
      }

      function saveTodosLocally() {
        localStorage.setItem("todos", JSON.stringify(todos));
      }

      function getUnsynced() {
        return JSON.parse(localStorage.getItem("unsynced")) || [];
      }

      function saveUnsynced(arr) {
        localStorage.setItem("unsynced", JSON.stringify(arr));
      }

      // -------------- Status and Online/Offline logic -----------------

      function updateStatus(text, online = true) {
        statusText.textContent = text;
        if (online) {
          statusDot.classList.remove("offline");
        } else {
          statusDot.classList.add("offline");
        }
      }

      function checkOnlineStatus() {
        isOnline = navigator.onLine;
        if (isOnline) {
          updateStatus("Online - Syncing with server", true);
          loadFromServer();
        } else {
          updateStatus("Offline - Working locally", false);
          loadFromLocal();
        }
      }

      // -------------- Server Sync and Data Handling -------------------

      // Loads all todos from server, syncs unsynced actions, then fetches all todos from server
      async function loadFromServer() {
        try {
          await pushUnsyncedChanges();

          const response = await fetch(API_URL);
          if (response.ok) {
            let serverTodos = await response.json();
            todos = serverTodos;

            saveTodosLocally();
            renderTodos();
            updateStatus("Online - Connected", true);
          }
        } catch (error) {
          console.error("Failed to load from server:", error);
          loadFromLocal();
          updateStatus("Offline - Using local data", false);
        }
      }

      function loadFromLocal() {
        todos = getStoredTodos();
        renderTodos();
      }

      // Save ONE todo to server. Optionally, for DELETE, send only id.
      async function saveToServer(todo, method = "POST", id = null) {
        if (!isOnline) {
          saveTodosLocally();
          return;
        }

        try {
          const url = id ? `${API_URL}/${id}` : API_URL;
          let options = {
            method: method,
            headers: { "Content-Type": "application/json" },
          };
          if (todo !== null) options.body = JSON.stringify(todo);

          const response = await fetch(url, options);

          if (response.ok) {
            // If POST, update todo with response (ID, etc.)
            if (method === "POST") {
              let updatedTodo = await response.json();
              todos = todos.map((t) =>
                t.id === updatedTodo.id ? updatedTodo : t
              );
              saveTodosLocally();
            }
            // Remove from unsynced if present
            if (["POST", "PUT", "DELETE"].includes(method)) {
              let unsyncedArr = getUnsynced();
              if (method === "DELETE" && id) {
                unsyncedArr = unsyncedArr.filter(
                  (action) => !(action.type === "delete" && action.id === id)
                );
              } else if (
                (method === "PUT" || method === "POST") &&
                todo &&
                todo.id
              ) {
                unsyncedArr = unsyncedArr.filter(
                  (action) =>
                    !(
                      (action.type === "add" || action.type === "update") &&
                      action.todo &&
                      action.todo.id === todo.id
                    )
                );
              }
              saveUnsynced(unsyncedArr);
            }
          }
        } catch (error) {
          console.error("Failed to save to server:", error);
          saveTodosLocally();
        }
      }

      // Push all local unsynced actions (add/update/delete) to server in order
      async function pushUnsyncedChanges() {
        let unsyncedArr = getUnsynced();

        for (const action of unsyncedArr) {
          if (action.type === "add") {
            await saveToServer(action.todo, "POST");
          } else if (action.type === "update") {
            await saveToServer(action.todo, "PUT", action.todo.id);
          } else if (action.type === "delete") {
            await saveToServer(null, "DELETE", action.id);
          }
        }
        // After syncing, clear unsynced
        saveUnsynced([]);
      }

      // -------------- Todo Actions ------------------------------------

      async function addTodo() {
        const text = todoInput.value.trim();
        if (text === "") return;
        const todo = {
          id: Date.now(),
          text: text,
          completed: false,
        };

        todos.push(todo);
        saveTodosLocally();

        if (isOnline) {
          await saveToServer(todo, "POST");
        } else {
          let u = getUnsynced();
          u.push({ type: "add", todo: todo });
          saveUnsynced(u);
        }

        todoInput.value = "";
        renderTodos();
      }

      async function deleteTodo(id) {
        const index = todos.findIndex((todo) => todo.id === id);
        if (index === -1) return;

        todos.splice(index, 1);

        if (isOnline) {
          await saveToServer(null, "DELETE", id);
        } else {
          let u = getUnsynced();
          u.push({ type: "delete", id: id });
          saveUnsynced(u);
        }

        saveTodosLocally();
        renderTodos();
      }

      async function toggleTodo(id) {
        const todo = todos.find((t) => t.id === id);
        if (todo) {
          todo.completed = !todo.completed;
          saveTodosLocally();

          if (isOnline) {
            await saveToServer(todo, "PUT", id);
          } else {
            let u = getUnsynced();
            u.push({ type: "update", todo: { ...todo } });
            saveUnsynced(u);
          }
          renderTodos();
        }
      }

      // -------------- Manual and Automatic Syncing --------------------

      async function syncWithServer() {
        if (!isOnline) {
          alert("Cannot sync while offline");
          return;
        }
        updateStatus("Syncing pending local changes...", true);
        await pushUnsyncedChanges();
        await loadFromServer();
        alert("Sync complete!");
      }

      // -------------- Rendering and Stats -----------------------------

      function renderTodos() {
        const filteredTodos = todos.filter((todo) => {
          if (currentFilter === "active") return !todo.completed;
          if (currentFilter === "completed") return todo.completed;
          return true;
        });

        todoList.innerHTML = "";

        if (filteredTodos.length === 0) {
          todoList.innerHTML =
            '<div class="empty-state">No tasks to show</div>';
        } else {
          filteredTodos.forEach((todo) => {
            const li = document.createElement("li");
            li.className = `todo-item ${todo.completed ? "completed" : ""}`;
            li.innerHTML = `
                        <input type="checkbox" ${
                          todo.completed ? "checked" : ""
                        } onchange="toggleTodo(${todo.id})" />
                        <span class="todo-text">${todo.text}</span>
                        <button class="delete-btn" onclick="deleteTodo(${
                          todo.id
                        })">Delete</button>
                    `;
            todoList.appendChild(li);
          });
        }

        updateStats();
      }

      function updateStats() {
        const total = todos.length;
        const completed = todos.filter((t) => t.completed).length;
        document.getElementById("totalTasks").textContent = `${total} ${
          total === 1 ? "task" : "tasks"
        }`;
        document.getElementById(
          "completedTasks"
        ).textContent = `${completed} completed`;
      }

      // -------------- Event Listeners and Startup Logic ---------------

      window.toggleTodo = toggleTodo;
      window.deleteTodo = deleteTodo;

      addBtn.addEventListener("click", addTodo);
      todoInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") addTodo();
      });

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          filterBtns.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          renderTodos();
        });
      });

      syncBtn.addEventListener("click", syncWithServer);

      // Listen for real browser connectivity changes.
      window.addEventListener("online", () => {
        isOnline = true;
        updateStatus("Back online - Syncing...", true);
        loadFromServer();
      });

      window.addEventListener("offline", () => {
        isOnline = false;
        updateStatus("Offline - Working locally", false);
      });

      // Initialize app
      checkOnlineStatus();
    </script>
  </body>
</html>
