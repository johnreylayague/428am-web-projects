<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cache Example Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>🗃️ Example Caching Page</h1>
      <p>
        This page is for testing static file caching with your Service Worker.
      </p>
      <ul>
        <li>This file is: <strong>example.html</strong></li>
        <li>Main styles: <code>styles.css</code></li>
        <li>With SW auto-registration if available</li>
      </ul>
      <div id="sw-status" style="margin: 10px 0; color: #333"></div>
      <button type="button" onclick="window.location.reload()">
        🔄 Reload Page
      </button>
      <div style="margin-top:25px;">
        <button type="button" onclick="window.location.href='index.html'" class="sync-btn">
          ➡️ Go to main todo app (index.html)
        </button>
      </div>
    </div>
  </body>
</html>
