  <body id="bg">
    <div class="page-wraper">
      <div id="loading-area" class="loading-3">
        <div class="loading"></div>
        <div class="loading-icon">
          <img src="images/logo/loading.svg" alt="company logo" />
        </div>
      </div>
      <!-- Content -->
      <div class="content-block">
        <div
          class="coming-soon"
          style="
            background-image: url(images/background/bg10.jpg);
            background-position: center;
            background-size: cover;
          "
        >
          <div class="countdown-box">
            <div class="button-home">
              <a
                href="mailto:sales@sterlingland.com.ph"
                class="btn btn-lg radius-xl text-truncate"
                ><i class="fas fa-envelope p-lr10"></i
                >sales@sterlingland.com.ph</a
              >
            </div>
            <div class="countdown">
              <div class="date">
                <span class="time days text-primary"></span>
                <div><strong>Days</strong></div>
              </div>
              <div class="date">
                <span class="time hours text-primary"></span>
                <div><strong>Hours</strong></div>
              </div>
              <div class="date">
                <span class="time mins text-primary"></span>
                <div><strong>Minutes</strong></div>
              </div>
              <div class="date">
                <span class="time secs text-primary"></span>
                <div><strong>Second</strong></div>
              </div>
            </div>
          </div>
          <div class="coming-head">
            <h2><strong>Coming Soon!</strong></h2>
          </div>
          <div class="container">
            <div class="section-intro">
              <h2>The Best of Both Worlds:</h2>
              <p>
                <span class="stamp sawtooth"
                  >Horizontal Housing & Vertical Living</span
                >
              </p>
              <p>
                <span class="stamp inverted"
                  >North Hills & Guada Verde Towers</span
                >
              </p>
            </div>
          </div>
        </div>
      </div>
      <!-- Content END-->
    </div>
    <!-- JAVASCRIPT FILES ========================================= -->
